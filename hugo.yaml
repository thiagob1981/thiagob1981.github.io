baseURL: "https://thiagob.dev/"
languageCode: "en"
title: "Thiago Baptista"
theme: "PaperMod"

params:
  env: production
  defaultTheme: dark
  disableThemeToggle: false
  showReadingTime: false
  showShareButtons: false
  showPostNavLinks: false
  showBreadCrumbs: false
  showCodeCopyButtons: true
  showToc: false
  hideFooter: false

  homeInfoParams:
    Title: "Thiago Baptista"
    Content: >
      Senior Data & Analytics Engineer specializing in **Lakehouse architectures** and **data products at scale**.


      Building end-to-end data solutions with Databricks, Apache Spark, Delta Lake, and Microsoft Fabric.

  socialIcons:
    - name: linkedin
      url: "https://linkedin.com/in/thiagob1981"
    - name: github
      url: "https://github.com/thiagob1981"
    - name: email
      url: "mailto:thiagob1981@gmail.com"

  profileMode:
    enabled: false

  assets:
    favicon: "/favicon.ico"

menu:
  main:
    - identifier: about
      name: About
      url: /about/
      weight: 10
    - identifier: certifications
      name: Certifications
      url: /certifications/
      weight: 20
    - identifier: portfolio
      name: Portfolio
      url: /portfolio/
      weight: 30

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true
